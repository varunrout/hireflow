<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireFlow — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 32px;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    header img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
    #status {
      font-size: 13px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="HireFlow" onerror="this.style.display='none'" />
    <h1>HireFlow Settings</h1>
  </header>

  <div class="card">
    <h2>API Configuration</h2>
    <label for="web-url">Web App URL</label>
    <input id="web-url" type="url" placeholder="http://localhost:3000" />
    <p class="hint" style="margin-bottom:16px">The HireFlow web app URL. Use <code style="color:#94a3b8">http://localhost:3000</code> for local dev, or your Vercel URL for production.</p>
    <label for="api-url">API Base URL</label>
    <input id="api-url" type="url" placeholder="https://hireflow-j68z.onrender.com" />
    <p class="hint">The URL of your HireFlow API server. Leave as default unless self-hosting.</p>
    <div class="row">
      <button id="save-btn">Save</button>
      <span id="status">Settings saved</span>
    </div>
  </div>

  <script src="options/index.js"></script>
</body>
</html>
